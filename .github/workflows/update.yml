name: Auto Coupang Hotdeal

on:
  schedule:
    - cron: '0 21 * * *' # 매일 한국 시간 아침 6시에 자동 실행 (UTC 21시 기준)
  workflow_dispatch: # 내가 원할 때 수동으로 버튼 눌러서 실행하는 기능

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 작업 공간 가져오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 3. 필요한 도구 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 4. 쿠팡 핫딜 가져오기 (비밀금고 열쇠 사용!)
      env:
        COUPANG_ACCESS: ${{ secrets.COUPANG_ACCESS }}
        COUPANG_SECRET: ${{ secrets.COUPANG_SECRET }}
      run: python main.py

    - name: 5. 새로 만든 화면(index.html) 깃허브에 자동 저장하기
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git commit -m "🔥 오늘의 핫딜 자동 업데이트 완료" || echo "변경사항 없음"
        git push
